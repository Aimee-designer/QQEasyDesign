        function loadImageFile(sectionId, elId, file) {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                for (const s of sections) {
                    const el = s.elements.find(el => el.id === elId);
                    if (el) { el.imageData = e.target.result; break; }
                }
                render();
            };
            reader.readAsDataURL(file);
        }

        // ===== 全局 Ctrl+V 粘贴图片 =====
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.startsWith('image/')) {
                    e.preventDefault();
                    const file = items[i].getAsFile();
                    if (!file) return;
                    // 查找选中的图片元素
                    if (selectedElId) {
                        for (const s of sections) {
                            const el = s.elements.find(e => e.id === selectedElId);
                            if (el && el.type === 'image') {
                                loadImageFile(s.id, selectedElId, file);
                                showToast('图片已粘贴');
                                return;
                            }
                        }
                    }
                    // 否则在最后一个段落追加图片，或新建段落
                    if (sections.length > 0 && activeSectionId) {
                        const section = sections.find(s => s.id === activeSectionId);
                        if (section) {
                            const newEl = { id: ++elementIdCounter, type: 'image', content: '', imageData: null };
                            section.elements.push(newEl);

                            reader2.readAsDataURL(file);
                            showToast('图片已粘贴');
                            return;
                        }
                    }
                    // 新建段落
                    const newEl = { id: ++elementIdCounter, type: 'image', content: '', imageData: null };
                    const newSection = { id: ++sectionIdCounter, elements: [newEl] };
                    sections.push(newSection);
                    selectedElId = newEl.id;

                    const reader3 = new FileReader();
                    reader3.onload = (ev) => { newEl.imageData = ev.target.result; render(); };

                    showToast('图片已粘贴');
                    return;

        function generateTemplateHtml(templateName) {
            // 读取当前页面的完整HTML源码
            const currentDoc = document.documentElement.outerHTML;
            // 构建注入脚本：在页面加载后恢复数据
            const savedSections = JSON.stringify(sections);
            const savedBgColor = JSON.stringify(currentBgColor);
            const restoreScript = `
<script>
(function(){
    // 等待原始脚本执行完毕后注入数据
    setTimeout(function(){
        try {
            // 通过自定义事件或直接操作恢复数据
            window.__TEMPLATE_DATA__ = ${savedSections};
            window.__TEMPLATE_BG__ = ${savedBgColor};
        } catch(e) { console.error('模板数据加载失败', e); }
    }, 0);
})();
<\/script>`;

            // 在IIFE启动部分注入模板数据加载逻辑
            // 生成一个完整的HTML副本，修改initDefault为加载模板数据
            let html = '<!DOCTYPE html>\n<html ' + document.documentElement.attributes[0].name + '="' + document.documentElement.attributes[0].value + '">';
            html += '\n<head>' + document.head.innerHTML + '</head>';
            html += '\n<body>' + document.body.innerHTML;
            // 插入恢复脚本
            html += restoreScript;
            html += '\n</body></html>';

            // 不行，这样太复杂。直接用fetch获取原始index.html也不行。
            // 最简单方案：生成一个独立HTML，嵌入数据，加载时自动恢复
            // 使用当前页面的原始源码，替换initDefault调用为加载模板数据

            // 更好的方案：直接用当前完整HTML，在script末尾注入模板恢复
            const blob = buildTemplateBlob(templateName);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (templateName || '模板') + '.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        function buildTemplateBlob(templateName) {
            // 克隆当前页面HTML
            const clone = document.documentElement.cloneNode(true);
            // 移除动态内容(canvasInner, panels等)
            const ci = clone.querySelector('#canvasInner');
            if (ci) ci.innerHTML = '';
            const gpl = clone.querySelector('#globalPanelList');
            if (gpl) gpl.innerHTML = '';
            const lpe = clone.querySelector('#localPanelEmpty');
            if (lpe) lpe.style.display = 'flex';
            const lpc = clone.querySelector('#localPanelContent');
            if (lpc) { lpc.style.display = 'none'; lpc.innerHTML = ''; }
            // 移除弹出菜单状态
            clone.querySelectorAll('.add-menu.show').forEach(m => m.classList.remove('show'));
            clone.querySelectorAll('.export-overlay.show').forEach(m => m.classList.remove('show'));
            clone.querySelectorAll('.template-modal-overlay.show').forEach(m => m.classList.remove('show'));

            // 找到script标签，在initDefault()调用前注入数据加载
            const scripts = clone.querySelectorAll('script');
            let mainScript = null;
            scripts.forEach(s => {
                if (s.textContent.includes('initDefault')) mainScript = s;
            });

            if (mainScript) {
                let code = mainScript.textContent;
                // 替换启动部分，注入模板数据
                const sectionsJson = JSON.stringify(sections);
                const loadCode = `
        // ===== 模板数据加载 =====
        (function loadTemplateData() {
            try {
                sections = ${sectionsJson};
                currentBgColor = ${JSON.stringify(currentBgColor)};
                sectionIdCounter = 0; elementIdCounter = 0;
                sections.forEach(function(s) {
                    if (s.id > sectionIdCounter) sectionIdCounter = s.id;
                    s.elements.forEach(function(e) { if (e.id > elementIdCounter) elementIdCounter = e.id; });
                });
                applyBgColor(currentBgColor);
            } catch(e) { console.error('模板数据加载失败', e); }
        })();
`;
                code = code.replace(
                    '// ===== 启动 =====\n        renderBgColorGrid();\n        initDefault();',
                    '// ===== 启动 =====\n' + loadCode + '        renderBgColorGrid();\n        render();'
                );
                mainScript.textContent = code;
            }

            const html = '<!DOCTYPE html>\n' + clone.outerHTML;
            return new Blob([html], { type: 'text/html;charset=utf-8' });
        }
        function renderTemplateModal() {
            const list = document.getElementById('templateList');
            if (templates.length === 0) {
                list.innerHTML = '<div class="template-modal-empty">暂无保存的模板</div>';
                return;
            }
            list.innerHTML = templates.map((t, i) => `
                <div class="template-modal-item" data-idx="${i}">
                    <span class="tpl-name">${t.name}</span>
                    <span class="tpl-del" data-delidx="${i}" title="删除">✕</span>
                </div>
            `).join('');
            list.querySelectorAll('.template-modal-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('tpl-del')) {
                        const idx = parseInt(e.target.dataset.delidx);
                        templates.splice(idx, 1);
                        localStorage.setItem('longimg_templates', JSON.stringify(templates));
                        renderTemplateModal();
                        return;
                    }
                    const idx = parseInt(item.dataset.idx);
                    const tpl = templates[idx];
                    // 兼容旧版 blocks 格式
                    if (tpl.sections) {
                        sections = JSON.parse(JSON.stringify(tpl.sections));
                        sectionIdCounter = 0; elementIdCounter = 0;
                        sections.forEach(s => {
                            if (s.id > sectionIdCounter) sectionIdCounter = s.id;
                            s.elements.forEach(e => { if (e.id > elementIdCounter) elementIdCounter = e.id; });
                        });
                        if (tpl.bgColor) {
                            currentBgColor = tpl.bgColor;
                            applyBgColor(currentBgColor);
                            renderBgColorGrid();
                        }
                    }
                    render();
                    document.getElementById('templateModal').classList.remove('show');
                });
            });
        }

        // ===== 工具函数 =====
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ===== 键盘 =====
        document.addEventListener('keydown', (e) => {
            const activeEl = document.activeElement;
            // 如果焦点在可编辑文本框内，不拦截任何键盘操作（支持Cmd+A全选、Delete删除等）
            if (activeEl && (activeEl.classList.contains('cv-editable') || activeEl.isContentEditable || activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
                return;
            }
            // 非编辑状态下，Delete/Backspace 删除选中的区块
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedElId) {
                e.preventDefault();
                for (const s of sections) {
                    const el = s.elements.find(el => el.id === selectedElId);
                    if (el) { removeElement(s.id, el.id); break; }
                }
            }
        });

        // 点击空白取消选中
        document.getElementById('canvasInner').addEventListener('click', (e) => {
            if (e.target === document.getElementById('canvasInner')) {
                selectedElId = null; activeSectionId = null;
                document.querySelectorAll('.cv-element.selected').forEach(el => el.classList.remove('selected'));
                document.querySelectorAll('.cv-section.active').forEach(el => el.classList.remove('active'));
                renderGlobalPanel(); renderLocalPanel();
            }
        });

        // ===== 文本格式浮层 =====
        const fmtToolbar = document.getElementById('textFormatToolbar');

        function showFormatToolbar() {
            const sel = window.getSelection();
            if (!sel || sel.isCollapsed || sel.rangeCount === 0) { hideFormatToolbar(); return; }
            const anchorNode = sel.anchorNode;
            const editableParent = anchorNode && (anchorNode.nodeType === Node.TEXT_NODE ? anchorNode.parentElement : anchorNode).closest('.cv-editable');
            if (!editableParent) { hideFormatToolbar(); return; }
            const range = sel.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            if (rect.width === 0) { hideFormatToolbar(); return; }
            fmtToolbar.classList.add('show');
            const tbRect = fmtToolbar.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - tbRect.width / 2;
            let top = rect.top - tbRect.height - 10;
            if (left < 8) left = 8;
            if (left + tbRect.width > window.innerWidth - 8) left = window.innerWidth - 8 - tbRect.width;
            if (top < 8) top = rect.bottom + 10;
            fmtToolbar.style.left = left + 'px';
            fmtToolbar.style.top = top + 'px';
            updateFormatStates();
        }

        function hideFormatToolbar() { fmtToolbar.classList.remove('show'); }

        function updateFormatStates() {
            const isBold = document.queryCommandState('bold');
            document.getElementById('fmtBold').classList.toggle('active', isBold);
            const color = document.queryCommandValue('foreColor');
            fmtToolbar.querySelectorAll('.fmt-color-dot').forEach(dot => dot.classList.remove('active'));
            if (color) {
                const hex = rgbToHex(color).toUpperCase();
                const activeDot = fmtToolbar.querySelector(`.fmt-color-dot[data-color="${hex}"]`);
                if (activeDot) activeDot.classList.add('active');
            }
        }

        function rgbToHex(rgb) {
            if (rgb.startsWith('#')) return rgb;
            const match = rgb.match(/\d+/g);
            if (!match || match.length < 3) return rgb;
            return '#' + match.slice(0, 3).map(n => parseInt(n).toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('fmtBold').addEventListener('mousedown', (e) => {
            e.preventDefault();
            document.execCommand('bold', false, null);
            updateFormatStates();
        });

        fmtToolbar.querySelectorAll('.fmt-color-dot').forEach(dot => {
            dot.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const color = dot.dataset.color;
                if (color === 'inherit') {
                    document.execCommand('removeFormat', false, null);
                } else {
                    document.execCommand('foreColor', false, color);
                }
                updateFormatStates();
                fmtToolbar.querySelectorAll('.fmt-color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
            });
        });

        document.addEventListener('selectionchange', () => {
            requestAnimationFrame(() => {
                const sel = window.getSelection();
                if (!sel || sel.isCollapsed) { hideFormatToolbar(); return; }
                const anchorNode = sel.anchorNode;
                const editableParent = anchorNode && (anchorNode.nodeType === Node.TEXT_NODE ? anchorNode.parentElement : anchorNode).closest('.cv-editable');
                if (editableParent) showFormatToolbar();
                else hideFormatToolbar();
            });
        });

        fmtToolbar.addEventListener('mousedown', (e) => e.stopPropagation());

        // ===== 启动 =====
        renderBgColorGrid();
        initDefault();
    })();
    </script>
</body>
</html>
